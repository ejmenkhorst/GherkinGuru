<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6b1f"/>
      <stop offset="100%" stop-color="#75b342"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4d65e"/>
      <stop offset="100%" stop-color="#6fa832"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="240" height="240" rx="54" fill="url(#bgGrad)"/>

  <!-- meditation aura -->
  <circle cx="120" cy="130" r="92" fill="none" stroke="#fff3d6" stroke-opacity="0.25" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- crossed-leg base -->
  <ellipse cx="120" cy="192" rx="58" ry="24" fill="#5f9a2c"/>
  <ellipse cx="120" cy="188" rx="58" ry="22" fill="#6fa832"/>

  <!-- arms resting on knees -->
  <path d="M 88 150 Q 68 172 70 190" fill="none" stroke="#6fa832" stroke-width="14" stroke-linecap="round"/>
  <path d="M 152 150 Q 172 172 170 190" fill="none" stroke="#6fa832" stroke-width="14" stroke-linecap="round"/>
  <circle cx="70" cy="191" r="9" fill="#a4d65e"/>
  <circle cx="170" cy="191" r="9" fill="#a4d65e"/>

  <!-- torso (pickle body) -->
  <path d="M 120 78
           C 92 78 78 100 78 132
           C 78 162 96 182 120 182
           C 144 182 162 162 162 132
           C 162 100 148 78 120 78 Z"
        fill="url(#bodyGrad)"/>

  <!-- pickle texture bumps -->
  <ellipse cx="98" cy="115" rx="3.2" ry="3.2" fill="#5f9a2c" opacity="0.7"/>
  <ellipse cx="142" cy="108" rx="3" ry="3" fill="#5f9a2c" opacity="0.7"/>
  <ellipse cx="105" cy="150" rx="3" ry="3" fill="#5f9a2c" opacity="0.7"/>
  <ellipse cx="136" cy="155" rx="3.2" ry="3.2" fill="#5f9a2c" opacity="0.7"/>
  <ellipse cx="120" cy="130" rx="3" ry="3" fill="#5f9a2c" opacity="0.6"/>

  <!-- head -->
  <circle cx="120" cy="88" r="34" fill="url(#bodyGrad)"/>

  <!-- turban -->
  <path d="M 84 82
           C 84 52 100 36 120 36
           C 140 36 156 52 156 82
           C 148 74 138 70 120 70
           C 102 70 92 74 84 82 Z"
        fill="#fff3d6"/>
  <path d="M 88 76 C 96 66 108 60 120 60 C 132 60 144 66 152 76"
        fill="none" stroke="#f2dca6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="40" r="6" fill="#fff3d6"/>
  <circle cx="120" cy="72" r="6" fill="#e85d3d"/>

  <!-- third eye -->
  <circle cx="120" cy="82" r="3" fill="#e85d3d"/>

  <!-- closed eyes -->
  <path d="M 104 94 Q 110 99 116 94" fill="none" stroke="#2f4a17" stroke-width="3" stroke-linecap="round"/>
  <path d="M 124 94 Q 130 99 136 94" fill="none" stroke="#2f4a17" stroke-width="3" stroke-linecap="round"/>

  <!-- serene smile -->
  <path d="M 110 104 Q 120 111 130 104" fill="none" stroke="#2f4a17" stroke-width="3" stroke-linecap="round"/>
</svg>
